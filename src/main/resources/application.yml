server:
  port: 8081

spring:
  application:
    name: auth-service
  config:
    import: optional:file:./config/localhost.properties
  data:
    mongodb:
      uri: ${AUTH_MONGODB_URI:mongodb://mongo:27017}
      database: ${AUTH_MONGODB_DATABASE:auth}
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

auth:
  jwt:
    secret: ${AUTH_JWT_SECRET:change-me-in-env-please-change-me-in-env}
    issuer: ${AUTH_JWT_ISSUER:auth-service}
    access-token-ttl-seconds: ${AUTH_ACCESS_TOKEN_TTL_SECONDS:900}
    refresh-token-ttl-seconds: ${AUTH_REFRESH_TOKEN_TTL_SECONDS:1209600}
    refresh-token-hmac-key: ${AUTH_REFRESH_TOKEN_HMAC_KEY:change-refresh-hmac-key}
  redis:
    enabled: ${AUTH_REDIS_ENABLED:false}

seed:
  tenant:
    id: ${AUTH_SEED_TENANT_ID:my-app}
  user:
    email: ${AUTH_SEED_USER_EMAIL:user@example.com}
    password: ${AUTH_SEED_USER_PASSWORD:change-me}
    role: ${AUTH_SEED_USER_ROLE:ROLE_OPERATOR}

management:
  endpoints:
    web:
      exposure:
        include: health,info
